name: Fitcountable
options:
  bundleIdPrefix: com.pentridgemedia
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    DEVELOPMENT_TEAM: R28KUQ4KQP
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 14
packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: 5.0.0
targets:
  Fitcountable:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Fitcountable
    dependencies:
      - package: RevenueCat
        product: RevenueCat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pentridgemedia.fitcountable
        INFOPLIST_FILE: Fitcountable/Info.plist
        CODE_SIGN_ENTITLEMENTS: Fitcountable/Fitcountable.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MACCATALYST: false
        SWIFT_VERSION: 6.0
        ENABLE_USER_SCRIPT_SANDBOXING: true
  FitcountableUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: FitcountableUITests
    dependencies:
      - target: Fitcountable
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pentridgemedia.fitcountable.uitests
        TEST_TARGET_NAME: Fitcountable
        GENERATE_INFOPLIST_FILE: true
        SWIFT_VERSION: 6.0
